name: CI ExploreCI - Qualité & Anti-Régression

on:
  push:
    branches: [ "main", "master", "develop" ]
  pull_request:
    branches: [ "main", "master", "develop" ]

jobs:
  # JOB 1 : AUDIT DE SYNTAXE ET RÈGLES DESIGN
  audit-qualite:
    name: 🔍 Audit Code & Respect de la Charte
    runs-on: ubuntu-latest

    steps:
    - name: 📥 Récupération du code du projet
      uses: actions/checkout@v4

    - name: 🐍 Configuration de Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: 🚨 Contrôle Zéro Icône Générique (Directive Design)
      run: |
        echo "Vérification de l'absence de placeholders ou d'images par défaut..."
        # Cherche les mots interdits dans les fichiers de données ou de code
        if grep -rn -E "default\.png|placeholder\.jpg|aucun_visuel" ./backend/ ; then
          echo "❌ ERREUR : Des icônes ou images par défaut ont été détectées !"
          echo "Veuillez les remplacer par les vraies photos de la Côte d'Ivoire avant de pusher."
          exit 1
        else
          echo "✅ Audit visuel OK : Aucune image générique par défaut trouvée."
        fi

  # JOB 2 : TESTS UNITAIRES DU BACKEND (Les 7 modules)
  tests-backend:
    name: 🧪 Tests Automatiques Backend
    runs-on: ubuntu-latest
    needs: audit-qualite # Ne se lance que si l'audit qualité est validé

    steps:
    - name: 📥 Récupération du code
      uses: actions/checkout@v4

    - name: 🐍 Configuration de Python & Cache Pip
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: 📦 Installation des dépendances du backend
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        if [ -f backend/requirements.txt ]; then pip install -r backend/requirements.txt; fi

    - name: 🚀 Exécution des tests (Comptes, Tourisme, Gamification...)
      run: |
        # Va dans le dossier backend et lance la suite de tests
        if [ -d "backend" ]; then cd backend; fi
        python manage.py test
